<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dotScratch Application</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            /* --- THE 60% DOMINANT LAYER (App Backgrounds & Canvas) --- */
            --color-60-surface-lowest: #f8fafc;   /* Main canvas background */
            --color-60-surface-base: #ffffff;     /* Card / Component background */
  
            /* --- THE 30% SECONDARY LAYER (Structure & Typography) --- */
            --color-30-content-main: #0f172a;     /* Main text & label colors */
            --color-30-content-muted: #64748b;    /* Secondary text / captions */
            --color-30-surface-divider: #e2e8f0;  /* Standard borders & lines */

            /* --- THE 10% ACCENT LAYER (Focal Points & Call-to-Actions) --- */
            --color-10-primary: #1a73e8;          /* Your specific brand blue */
            --color-10-primary-light: #e8f0fe;    /* Active background tint */
            --color-10-hover-border: #7baaf7;     /* Hover state border */
            --color-10-hover-bg: #f1f5fd;         /* Hover state background */
            --color-10-accent-text: #ffffff;      /* Text on top of primary colors */
  
            /* Utility Overrides */
            --color-system-danger: #ef4444;       /* Errors / Destructive actions */

            /* conversion to control stuff */
            
            /* 60% Areas (Dominant spaces) */
            --bg-app: var(--color-60-surface-lowest);
            --bg-card: var(--color-60-surface-base);

            /* 30% Areas (Framing & Text) */
            --text-main: var(--color-30-content-main);
            --text-muted: var(--color-30-content-muted);
            --border-subtle: var(--color-30-surface-divider);

            /* 10% Areas (Interractive elements) */
            --bg-action: var(--color-10-primary);
            --text-on-action: var(--color-10-accent-text);

            /* UI Interactive Shortcuts (Mapped from your original styles) */
            --selected-background: var(--color-10-primary-light);
            --selected-border: var(--color-10-primary);
            --hover-background: var(--color-10-hover-bg);
            --hover-border: var(--color-10-hover-border);
  
            /* Quick fallbacks */
            --bg-color: var(--bg-card);
            --fg-color: var(--text-main);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-color: var(--bg-app);
            color: var(--text-main);
            overflow: hidden;
        }

        /* Top Row Controls */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--bg-card);
            padding: 6px 12px;
            height: 60px;
            border-bottom: 1px solid var(--border-subtle);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            z-index: 10;
        }

        /* Main App Workspace Layout */
        .main-container {
            display: flex;
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        /* Expandable Sidebar Menu */
        .sidebar {
            width: 280px;
            background-color: var(--bg-card);
            border-right: 1px solid var(--border-subtle);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 5;
        }

            .sidebar.collapsed {
                margin-left: -280px;
            }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

            .sidebar-header h2 {
                font-size: 16px;
                font-weight: 600;
            }

        .btn-new-sketch {
            background-color: var(--bg-action);
            color: var(--text-on-action);
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            font-size: 13px;
            transition: background 0.2s ease;
        }

            .btn-new-sketch:hover {
                background-color: var(--bg-action-hover);
            }

        .sketch-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .sketch-item {
            padding: 12px 15px;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 4px;
            font-size: 14px;
            transition: background 0.2s ease;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

            .sketch-item:hover {
                background-color: var(--hover-background);
            }

            .sketch-item.active {
                background-color: var(--selected-background);
                color: var(--selected-border);
                font-weight: 500;
            }

        /* Toggle Button Hooked Adjacent to Sidebar */
        .sidebar-toggle {
            position: absolute;
            left: 280px;
            top: 15px;
            z-index: 6;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-left: none;
            border-radius: 0 6px 6px 0;
            padding: 10px 8px;
            cursor: pointer;
            box-shadow: 2px 2px 6px rgba(0,0,0,0.04);
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: bold;
        }

        .sidebar.collapsed + .sidebar-toggle {
            left: 0;
        }

        /* Right Canvas Sandbox Pane */
        .canvas-container {
            flex: 1;
            position: relative;
            background-color: var(--bg-app);
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
        }

        .canvas-stats {
            position: absolute;
            bottom: 15px;
            right: 15px;
            background: var(--bg-card);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            color: var(--text-muted);
            backdrop-filter: blur(4px);
            pointer-events: none;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        .active {
            background: var(--selected-background);
            border: 1px solid var(--selected-border);
            color: var(--selected-border);
            border-radius: 5px;
        }

        .palette-swatch {
            min-width: 40px;
            min-height: 40px;
            display: inline-block;
            cursor: pointer;
        }

        .palette-color {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 3px;
        }

        .palette-color .palette-swatch {
            border-radius: 20px;
            border: 8px solid var(--bg-card);
        }

        .palette-color .palette-swatch:hover {
            border-radius: 20px;
            color: inherit;
            border: 4px solid var(--bg-card);
        }

        .palette-color .palette-swatch.active {
            border-radius: 20px;
            color: inherit;
            border: 4px solid var(--selected-background);
            outline: 2px solid var(--selected-border);
        }

        .palette-thickness {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .palette-thickness .palette-swatch {
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
        }

        .palette-thickness .palette-swatch:hover {
            background: var(--hover-background);
            border: 1px solid var(--hover-border);
        }

        .palette-thickness .palette-swatch.active {
            background: var(--selected-background);
            border: 1px solid var(--selected-border);
        }

        .tool-quickedit {
            display: flex;
            flex-direction: row;
            gap: 10px;
        }

        .tool-quickedit .property-editor {
            display: flex;
            flex-direction: row;
        }

        .tool-fulledit {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .tool-fulledit .property-editor {
            display: flex;
            flex-direction: column;
        }

        .tool-fulledit label {
            color: var(--text-main);
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <div id="top-bar" class="top-bar">
    </div>

    <div class="main-container">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>Sketches</h2>
                <button class="btn-new-sketch" id="btn-add-sketch">+ New</button>
            </div>
            <div id="sketch-list" class="sketch-list">
            </div>
        </div>

        <button class="sidebar-toggle" id="sidebar-toggle">⟨</button>

        <div class="canvas-container">
            <canvas id="sketchCanvas"></canvas>
            <div class="canvas-stats" id="canvas-stats">Zoom: 100%</div>
        </div>
    </div>

    <script type="module" src="./src/app.ts"></script>

</body>
</html>
